name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"] # Tự động chạy khi bạn push code lên nhánh main

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Kích hoạt Node.js 24 ngay bây giờ để tránh cảnh báo deprecation
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24" # Nâng cấp lên phiên bản 24
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build with Next.js
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # Thư mục chứa file tĩnh đã build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
