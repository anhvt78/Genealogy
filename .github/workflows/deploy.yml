name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build with Next.js
        run: npm run build
        
      - name: List output directory     # ← THÊM ĐỂ DEBUG
        run: |
          echo "=== Nội dung thư mục out/ ==="
          ls -la ./out/
          echo "=== Kiểm tra _next ==="
          ls -la ./out/_next/ || echo "_next KHÔNG TỒN TẠI!"
          echo "=== Kiểm tra .nojekyll ==="
          ls -la ./out/.nojekyll || echo ".nojekyll KHÔNG TỒN TẠI!"

      - name: Add .nojekyll
        run: touch ./out/.nojekyll        # ← CHỈ THÊM DÒNG NÀY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
